services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m bot.main
    env_file: .env
    restart: unless-stopped
    depends_on:
      - worker

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m worker.main
    env_file: .env
    restart: unless-stopped

  postiz:
    image: ghcr.io/gitroomhq/postiz-app:latest
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://${POSTIZ_DB_USER:-postiz}:${POSTIZ_DB_PASSWORD:-postiz}@postiz-db:5432/postiz
      - REDIS_URL=redis://postiz-redis:6379
    restart: unless-stopped
    depends_on:
      - postiz-db
      - postiz-redis

  postiz-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTIZ_DB_USER:-postiz}
      POSTGRES_PASSWORD: ${POSTIZ_DB_PASSWORD:-postiz}
      POSTGRES_DB: postiz
    volumes:
      - postiz-db-data:/var/lib/postgresql/data
    restart: unless-stopped

  postiz-redis:
    image: redis:7-alpine
    restart: unless-stopped

volumes:
  postiz-db-data:
